<!DOCTYPE html>
<html lang="zh-CN" x-data="chatApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服AI机器人 - Alpine.js版本</title>
    <link rel="stylesheet" href="/static/styles.css">
<!-- 添加自定义样式 -->
<style>
.fix-confirmation {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    font-size: 14px;
    color: #666;
}

.fix-confirmation button {
    margin-left: 15px;
    padding: 4px 12px;
    border: none;
    border-radius: 15px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-fix-confirm {
    background-color: #4CAF50;
    color: white;
}

.btn-fix-confirm:hover {
    background-color: #3d8b40;
}

.btn-fix-deny {
    background-color: #f44336;
    color: white;
}

.btn-fix-deny:hover {
    background-color: #da190b;
}
</style>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>客服AI机器人</h2>
            <div class="status-indicator">
                <span class="online-dot"></span>
                <span>在线</span>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be dynamically added here -->
            <template x-for="message in messages" :key="message.id">
                <div :class="`message ${message.sender === 'user' ? 'user-message' : 'bot-message'}`">
                    <div x-html="renderMarkdown(message.text)"></div>
                    <div class="message-time" x-text="message.time"></div>
                    <!-- 修复结果确认区域 -->
                    <div x-show="message.show_fix_confirmation" class="fix-confirmation">
                        <span>修复结果是否符合正确？</span>
                        <button @click="confirmFixResult(message.feedback_id, true)" class="btn-correct">正确</button>
                        <button @click="confirmFixResult(message.feedback_id, false)" class="btn-wrong">错误</button>
                    </div>
                </div>
            </template>
            
            <!-- Loading indicator -->
            <div x-show="loading" class="message bot-message loading-message">
                <div class="loading-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="message-time" x-text="getCurrentTime()"></div>
            </div>
            
            
        </div>
            
            
        <!-- 错误反馈按钮和转人工按钮 - 固定在聊天内容区域左下方 -->
        <div class="action-buttons-container">
            <button @click="showFeedbackModal = true" class="error-feedback-btn">反馈错误</button>
            <button @click="showTransferModal = true" class="transfer-to-human-btn">转人工</button>
        </div>
        <div class="chat-input-container">
            <div class="input-wrapper">
                <textarea 
                    id="userInput"
                    x-model="inputMessage"
                    @input="autoResize($event.target)"
                    @keydown.enter="handleEnterKey($event)"
                    placeholder="请输入您的问题..."
                    rows="1"
                    maxlength="500"
                ></textarea>
                <button @click="sendMessage" class="send-button" :disabled="!inputMessage.trim() || loading">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <div class="suggestions">
                <span class="suggestion-item">常见问题：</span>
                <button @click="useSuggestion('如何重置密码？')" class="suggestion-btn">如何重置密码？</button>
                <button @click="useSuggestion('订单状态查询')" class="suggestion-btn">订单状态查询</button>
                <button @click="useSuggestion('退款政策')" class="suggestion-btn">退款政策</button>
            </div>
        </div>
    </div>

    <!-- 错误反馈弹窗 -->
    <div x-show="showFeedbackModal" class="modal" @click.outside="showFeedbackModal = false">
        <div class="modal-content">
            <span class="close" @click="showFeedbackModal = false">&times;</span>
            <h3>提交错误反馈</h3>
            <div class="form-group">
                <label for="errorType">错误类型:</label>
                <select x-model="feedback.errorType">
                    <option value="知识库未匹配到正确答案">知识库未匹配到正确答案</option>
                    <option value="特定问题操作步骤错误">特定问题操作步骤错误</option>
                    <option value="回复内容不准确">回复内容不准确</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label for="errorDescription">详细错误描述:</label>
                <textarea x-model="feedback.description" rows="4" placeholder="请详细描述机器人回答的错误..."></textarea>
            </div>
            <button @click="submitFeedback" class="btn">提交反馈</button>
        </div>
    </div>

    <!-- 转人工确认弹窗 -->
    <div x-show="showTransferModal" class="modal" @click.outside="showTransferModal = false">
        <div class="modal-content">
            <span class="close transfer-close" @click="showTransferModal = false">&times;</span>
            <h3>转接人工客服</h3>
            <p>您确定要转接人工客服吗？人工客服将在工作时间内为您服务。</p>
            <div class="modal-actions">
                <button @click="showTransferModal = false" class="btn-cancel">取消</button>
                <button @click="transferToHuman" class="btn-confirm">确认转接</button>
            </div>
        </div>
    </div>

    <script>
        function chatApp() {
            return {
                // State
                messages: [],
                inputMessage: '',
                loading: false,
                sessionId: null,
                userId: 'user_' + Date.now(),
                currentQuestion: '',
                currentReply: '',
                
                // Modal states
                showFeedbackModal: false,
                showTransferModal: false,
                
                // Feedback form data
                feedback: {
                    errorType: '知识库未匹配到正确答案',
                    description: ''
                },
                
                // Initialize
                init() {
                    this.addBotMessage('您好！我是客服AI机器人，请问有什么可以帮您的吗？😊');
                },
                
                // Message handling
                addUserMessage(text) {
                    const message = {
                        id: Date.now(),
                        sender: 'user',
                        text: text,
                        time: this.getCurrentTime()
                    };
                    this.messages.push(message);
                    this.currentQuestion = text;
                    this.scrollToBottom();
                },
                
                addBotMessage(text) {
                    const message = {
                        id: Date.now(),
                        sender: 'bot',
                        text: text,
                        time: this.getCurrentTime()
                    };
                    this.messages.push(message);
                    this.currentReply = text;
                    this.scrollToBottom();
                },
                
                
                // Send message
                async sendMessage() {
                    const message = this.inputMessage.trim();
                    if (!message) return;
                    
                    this.addUserMessage(message);
                    this.inputMessage = '';
                    this.loading = true;
                    
                    try {
                        const response = await this.callBackendAPI(message);
                        this.loading = false;
                        this.addBotMessage(response.data.reply);
                        this.sessionId = response.data.session_id;
                    } catch (error) {
                        this.loading = false;
                        console.error('API Error:', error);
                        this.addBotMessage('抱歉，服务暂时不可用。请稍后再试或联系技术支持。');
                    }
                },
                
                // Use suggestion
                useSuggestion(text) {
                    this.inputMessage = text;
                    this.sendMessage();
                },
                
                // Auto resize textarea
                autoResize(textarea) {
                    textarea.style.height = 'auto';
                    textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
                },
                
                // Handle Enter key
                handleEnterKey(event) {
                    if (event.shiftKey) {
                        // Shift + Enter: allow default behavior (newline)
                        return;
                    }
                    // Enter only: prevent default and send message
                    event.preventDefault();
                    this.sendMessage();
                },
                
                // Scroll to bottom
                scrollToBottom() {
                    setTimeout(() => {
                        const chatMessages = document.getElementById('chatMessages');
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    }, 0);
                },
                
                // Get current time
                getCurrentTime() {
                    const now = new Date();
                    return now.getHours().toString().padStart(2, '0') + ':' + 
                           now.getMinutes().toString().padStart(2, '0');
                },
                
                // Call backend API
                async callBackendAPI(question) {
                    const apiUrl = '/api/robot/consult';
                    
                    const requestBody = {
                        user_id: this.userId,
                        question: question
                    };
                    
                    // 只有当sessionId有有效值时才添加session_id字段
                    if (this.sessionId) {
                        requestBody.session_id = this.sessionId;
                    }
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(requestBody)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data.code !== 200) {
                        throw new Error(data.msg || 'API request failed');
                    }
                    
                    return data;
                },
                
                // Render markdown to HTML
                renderMarkdown(text) {
                    return marked.parse(text);
                },
                
                // Submit feedback
                async submitFeedback() {
                    // 立即关闭反馈窗口
                    this.showFeedbackModal = false;
                    const tempDescription = this.feedback.description;
                    const tempErrorType = this.feedback.errorType;
                    this.feedback.description = '';
                    
                    // 添加等待回复消息
                    const waitingMessage = {
                        id: Date.now(),
                        sender: 'bot',
                        text: '正在处理您的错误反馈，请稍候...',
                        time: this.getCurrentTime(),
                        is_waiting_feedback: true
                    };
                    this.messages.push(waitingMessage);
                    this.scrollToBottom();
                    
                    try {
                        // 构建错误反馈JSON数据
                        const feedbackData = {
                            feedback_error_type: tempErrorType,
                            feedback_error_detail: tempDescription
                        };
                        
                        // 调用机器人咨询接口，传入错误反馈数据和classification
                        const response = await this.callBackendAPIWithErrorFeedback(feedbackData);
                        
                        // 移除等待消息
                        const waitingIndex = this.messages.findIndex(msg => msg.is_waiting_feedback);
                        if (waitingIndex !== -1) {
                            this.messages.splice(waitingIndex, 1);
                        }
                        
                        if (response.code === 200) {
                            const replyData = response.data;
                            
                            // 添加机器人回复消息
                            this.addBotMessage(replyData.reply);
                            
                            // 检查是否包含feedback_id和auto_fix_result字段
                            if (replyData.error_feedback_result && replyData.error_feedback_result.feedback_id && 
                                replyData.error_feedback_result.auto_fix_result !== undefined) {
                                // 在最后一条消息后面添加特殊处理
                                this.messages[this.messages.length - 1].feedback_id = replyData.error_feedback_result.feedback_id;
                                this.messages[this.messages.length - 1].auto_fix_result = replyData.error_feedback_result.auto_fix_result;
                                
                                // 如果auto_fix_result为 true，显示确认按钮
                                if (replyData.error_feedback_result.auto_fix_result === true) {
                                    this.messages[this.messages.length - 1].show_fix_confirmation = true;
                                }
                            }
                        } else {
                            alert(`提交失败: ${response.msg}`);
                            // 如果失败，添加错误消息
                            this.addBotMessage('抱歉，处理错误反馈时出现问题，请稍后再试。');
                        }
                    } catch (error) {
                        console.error('提交错误反馈时出错:', error);
                        // 移除等待消息（如果还存在）
                        const waitingIndex = this.messages.findIndex(msg => msg.is_waiting_feedback);
                        if (waitingIndex !== -1) {
                            this.messages.splice(waitingIndex, 1);
                        }
                        alert('提交失败，请稍后再试');
                        this.addBotMessage('抱歉，处理错误反馈时出现问题，请稍后再试。');
                    }
                },
                
                // Call backend API with error feedback
                async callBackendAPIWithErrorFeedback(feedbackData) {
                    const apiUrl = '/api/robot/consult';
                    
                    const requestBody = {
                        user_id: this.userId,
                        question: JSON.stringify(feedbackData),
                        classification: "error_feedback"
                    };
                    
                    // 只有当sessionId有有效值时才添加session_id字段
                    if (this.sessionId) {
                        requestBody.session_id = this.sessionId;
                    }
                    
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(requestBody)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    return data;
                },
                
                // Transfer to human
                async transferToHuman() {
                    try {
                        this.showTransferModal = false;
                        this.addBotMessage('正在为您转接人工客服，请稍候...');
                        
                        setTimeout(() => {
                            this.addBotMessage('已成功转接至人工客服。人工客服将在工作时间内（9:00-18:00）为您提供服务。');
                        }, 2000);
                    } catch (error) {
                        console.error('转接人工客服失败:', error);
                        alert('转接失败，请稍后再试或联系技术支持。');
                    }
                },
                
                // Confirm fix result
                async confirmFixResult(feedbackId, isCorrect) {
                    try {
                        const status = isCorrect ? 
                            '自动修复_用户反馈正确' : '自动修复_用户反馈错误';
                        
                        const response = await fetch(`/api/error-feedback/${feedbackId}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                status: status
                            })
                        });
                        
                        const result = await response.json();
                        
                        if (result.code === 200) {
                            // 更新消息状态，隐藏确认按钮
                            const messageIndex = this.messages.findIndex(msg => msg.feedback_id === feedbackId);
                            if (messageIndex !== -1) {
                                this.messages[messageIndex].show_fix_confirmation = false;
                                this.messages[messageIndex].fix_confirmed = true;
                                this.messages[messageIndex].confirmation_result = isCorrect ? '正确' : '错误';
                            }
                        } else {
                            alert(`更新失败: ${result.msg}`);
                        }
                    } catch (error) {
                        console.error('更新修复结果时出错:', error);
                        alert('更新失败，请稍后再试');
                    }
                },
            };
        }
    </script>
</body>
</html>
