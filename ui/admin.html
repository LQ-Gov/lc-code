<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理系统 - 客服AI机器人</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #f5f5f5;
            border: 1px solid #ddd;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            margin-right: 5px;
        }
        
        .tab.active {
            background-color: #fff;
            border-bottom: 1px solid #fff;
            margin-bottom: -1px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            min-width: 100px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        .btn {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        
        .btn:hover {
            background-color: #0056b3;
        }
        
        .btn-danger {
            background-color: #dc3545;
        }
        
        .btn-danger:hover {
            background-color: #c82333;
        }
        
        .btn-success {
            background-color: #28a745;
        }
        
        .btn-success:hover {
            background-color: #218838;
        }
        
        .btn-secondary {
            background-color: #6c757d;
        }
        
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f2f2f2;
        }
        
        .actions {
            display: flex;
            gap: 5px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .notification {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            display: none;
        }
        
        .notification.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .notification.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.4);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 80%;
            max-width: 600px;
        }
        
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        
        /* 问题和答案内容的样式 */
        .qa-content {
            max-height: 100px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: #f9f9f9;
            padding: 5px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
        
        /* 响应式表格 */
        @media (max-width: 768px) {
            .admin-container {
                padding: 10px;
            }
            
            th, td {
                padding: 8px 4px;
                font-size: 12px;
            }
            
            .qa-content {
                max-height: 60px;
                font-size: 10px;
            }
        }
        
        /* 知识库URL输入区域 */
        #kb-url {
            display: none;
            flex: 1;
            margin-right: 10px;
        }
        
        #kb-url.active {
            display: block;
        }
        
        .kb-actions {
            display: flex;
            gap: 5px;
        }
        
        .kb-form-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container admin-container">
        <h1>管理系统</h1>
        
        <div class="notification" id="notification"></div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('knowledge-base')">知识库管理</div>
            <div class="tab" onclick="switchTab('special-flows')">特殊问题流程</div>
            <div class="tab" onclick="switchTab('error-feedback')">错误反馈管理</div>
        </div>
        
        <div class="tab-content active" id="knowledge-base-tab">
            <h2>知识库管理</h2>
            
            <!-- 知识库URL表单行 -->
            <div class="kb-form-row">
                <label for="kb-url">知识库URL:</label>
                <input type="text" id="kb-url" placeholder="请输入知识库URL">
                <div class="kb-actions">
                    <button class="btn" id="kb-edit-btn" onclick="toggleKbUrlInput()">编辑</button>
                </div>
            </div>
            
            <div class="loading" id="kb-loading">正在处理...</div>
            
            <table id="kb-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>种子URL</th>
                        <th>当前URL</th>
                        <th>问题</th>
                        <th>答案</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="kb-tbody">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>
        
        <div class="tab-content" id="special-flows-tab">
            <h2>特殊问题流程管理</h2>
            
            <div class="form-group">
                <label for="flow-key">流程标识:</label>
                <input type="text" id="flow-key" placeholder="请输入流程唯一标识">
            </div>
            
            <div class="form-group">
                <label for="flow-desc">流程描述:</label>
                <textarea id="flow-desc" rows="2" placeholder="请输入流程描述"></textarea>
            </div>
            
            <div class="form-group">
                <label for="flow-prompt">处理提示:</label>
                <textarea id="flow-prompt" rows="4" placeholder="请输入处理提示或指令"></textarea>
            </div>
            
            <div class="form-group">
                <label for="flow-status">状态:</label>
                <select id="flow-status">
                    <option value="active">启用</option>
                    <option value="inactive">禁用</option>
                </select>
            </div>
            
            <button class="btn" onclick="saveSpecialFlow()">保存流程</button>
            
            <div class="loading" id="flow-loading">正在处理...</div>
            
            <table id="flows-table">
                <thead>
                    <tr>
                        <th>标识</th>
                        <th>描述</th>
                        <th>提示</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="flows-tbody">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>
        
        <div class="tab-content" id="error-feedback-tab">
            <h2>错误反馈管理</h2>
            
            <div class="loading" id="feedback-loading">正在加载...</div>
            
            <table id="feedback-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>会话ID</th>
                        <th>问题</th>
                        <th>机器人回复</th>
                        <th>错误类型</th>
                        <th>错误描述</th>
                        <th>提交时间</th>
                        <th>修复状态</th>
                        <th>修复时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="feedback-tbody">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 修改反馈模态框 -->
    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>修改反馈状态</h3>
            <div class="form-group">
                <label for="update-fix-status">修复状态:</label>
                <select id="update-fix-status">
                    <option value="pending">待处理</option>
                    <option value="processing">处理中</option>
                    <option value="fixed">已修复</option>
                    <option value="wont_fix">不修复</option>
                </select>
            </div>
            <div class="form-group">
                <label for="update-error-desc">备注:</label>
                <textarea id="update-error-desc" rows="3" placeholder="请输入备注信息"></textarea>
            </div>
            <button class="btn btn-success" onclick="updateFeedbackStatus()">更新状态</button>
        </div>
    </div>

    <script src="/static/admin-script.js"></script>
</body>
</html>
