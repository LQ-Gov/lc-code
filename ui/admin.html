<!DOCTYPE html>
<html lang="zh-CN" x-data="adminApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理系统 - 客服AI机器人</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        /* 修复body溢出问题 */
        body {
            overflow: auto !important;
            height: auto !important;
        }
        
        /* 现代化全局样式 */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #818cf8;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --info: #3b82f6;
            --info-hover: #2563eb;
            --secondary: #6b7280;
            --secondary-hover: #4b5563;
            --light: #f9fafb;
            --dark: #1f2937;
            --border: #e5e7eb;
            --card-bg: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
            /* 移除 min-height: 100vh，允许页面自然滚动 */
        }
        
        /* 标题样式 */
        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 1.5rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 1.25rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }
        
        /* 标签页样式 */
        .tabs {
            display: flex;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 0.25rem;
            box-shadow: var(--shadow);
            margin-bottom: 1.5rem;
        }
        
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-radius: var(--radius);
            font-weight: 600;
            color: var(--secondary);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .tab:hover {
            color: var(--primary);
            background-color: rgba(79, 70, 229, 0.05);
        }
        
        .tab.active {
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            box-shadow: var(--shadow-sm);
        }
        
        /* 卡片容器 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        /* 表单组样式 */
        .form-group {
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--dark);
            min-width: 120px;
            margin-top: 0.25rem;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            background-color: var(--light);
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        /* 按钮样式 */
        .btn {
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success), var(--success-hover));
            color: white;
        }
        
        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), var(--danger-hover));
            color: white;
        }
        
        .btn-danger:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-hover));
            color: white;
        }
        
        .btn-secondary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-1px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 1rem;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow);
            table-layout: fixed; /* 固定表格布局 */
            min-width: max-content; /* 确保表格不会被压缩到小于内容宽度 */
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
            /* 确保单元格内容不会影响表格布局 */
            word-break: keep-all;
        }
        
        th {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            font-weight: 600;
            position: sticky;
            top: 0;
            font-size: 0.9rem; /* 调整表头字号 */
        }
        
        td {
            font-size: 0.85rem; /* 调整表格内容字号 */
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        /* 移除所有表格的鼠标悬停效果 */
        tr:hover {
            /* background-color: rgba(79, 70, 229, 0.03); */
        }
        
        /* 操作按钮组 */
        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        /* 小尺寸按钮样式 */
        .btn-small {
            padding: 0.4rem 0.6rem;
            font-size: 0.75rem;
            min-height: auto;
        }
        
        /* 特殊流程操作按钮 - 确保不换行且尺寸更小 */
        #flows-table .actions {
            flex-wrap: nowrap;
            justify-content: flex-start;
        }
        
        #flows-table .actions .btn {
            padding: 0.4rem 0.6rem;
            font-size: 0.75rem;
            min-height: auto;
        }
        
        /* 加载指示器 */
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--secondary);
        }
        
        .loading-spinner {
            width: 2rem;
            height: 2rem;
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 通知区域 */
        .notification {
            padding: 1rem;
            margin: 1rem 0;
            border-radius: var(--radius);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .notification.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-left: 4px solid var(--success);
        }
        
        .notification.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }
        
        /* 问题和答案内容的样式 */
        .qa-content {
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            background-color: var(--light);
            padding: 0.75rem;
            border-radius: var(--radius);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.875rem;
            border: 1px solid var(--border);
        }
        
        /* 单行内容样式 - 用于URL、问题、答案等 */
        .single-line-content {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            cursor: help;
            padding: 0.25rem 0;
            color: var(--dark);
            font-size: 0.85rem; /* 与表格内容字号一致 */
        }
        
        .single-line-content:hover {
            background-color: rgba(79, 70, 229, 0.05);
            border-radius: var(--radius);
        }
        
        /* 知识库URL输入区域 */
        .kb-form-row {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .kb-form-row label {
            min-width: 100px;
            font-weight: 600;
            color: var(--dark);
        }
        
        /* 统一的URL输入框样式 */
        #kb-url-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            background-color: var(--light);
            height: 2.5rem;
            line-height: 1.2;
            color: var(--dark);
            /* 移除input默认样式 */
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }
        
        /* 只读状态样式 */
        #kb-url-input:disabled {
            background-color: var(--light);
            cursor: default;
            opacity: 1;
        }
        
        #kb-url-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        
        .kb-input-container {
            flex: 1;
            min-width: 200px;
            height: 2.5rem;
            display: flex;
            align-items: center;
        }
        
        .kb-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            /* 确保按钮在同一行 */
            white-space: nowrap;
        }
        
        /* 编辑模式下的表单行 */
        .kb-form-edit-mode {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .kb-form-edit-mode label {
            min-width: 100px;
            font-weight: 600;
            color: var(--dark);
            margin-top: 0.5rem;
        }
        
        /* 分页控件样式 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 1rem 0;
        }
        
        .pagination button {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            color: var(--dark);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 2.5rem;
        }
        
        .pagination button:hover:not(:disabled) {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .pagination .current {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
            font-weight: 600;
        }
        
        .pagination-info {
            color: var(--secondary);
            font-size: 0.875rem;
            margin-left: 1rem;
        }
        
        /* 模态框样式 */
        .modal {
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: var(--shadow-lg);
            transform: scale(0.95);
            animation: modalAppear 0.3s ease forwards;
        }
        
        @keyframes modalAppear {
            to { transform: scale(1); }
        }
        
        .close {
            position: absolute;
            right: 1.25rem;
            top: 1.25rem;
            color: var(--secondary);
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        
        .close:hover {
            color: var(--danger);
        }
        
        /* 调整各列宽度 - 知识库表格 */
        #kb-table th:nth-child(1),
        #kb-table td:nth-child(1) { /* ID列 */
            width: 5%;
            min-width: 60px;
        }
        
        #kb-table th:nth-child(2),
        #kb-table td:nth-child(2) { /* 种子URL列 */
            width: 15%;
            min-width: 120px;
        }
        
        #kb-table th:nth-child(3),
        #kb-table td:nth-child(3) { /* 当前URL列 */
            width: 15%;
            min-width: 120px;
        }
        
        #kb-table th:nth-child(4),
        #kb-table td:nth-child(4) { /* 问题列 */
            width: 20%;
            min-width: 150px;
        }
        
        #kb-table th:nth-child(5),
        #kb-table td:nth-child(5) { /* 答案列 */
            width: 20%;
            min-width: 150px;
        }
        
        #kb-table th:nth-child(6),
        #kb-table td:nth-child(6) { /* 创建时间列 */
            width: 15%;
            min-width: 120px;
        }
        
        #kb-table th:nth-child(7),
        #kb-table td:nth-child(7) { /* 操作列 */
            width: 10%;
            min-width: 80px;
        }
        
        /* 调整特殊流程表格列宽 */
        #flows-table th:nth-child(1),
        #flows-table td:nth-child(1) { /* 标识列 */
            width: 12%;
            min-width: 100px;
            max-width: 150px;
        }
        
        #flows-table th:nth-child(2),
        #flows-table td:nth-child(2) { /* 描述列 */
            width: 18%;
            min-width: 120px;
        }
        
        #flows-table th:nth-child(3),
        #flows-table td:nth-child(3) { /* 提示列 */
            width: 40%;
            min-width: 200px;
        }
        
        #flows-table th:nth-child(4),
        #flows-table td:nth-child(4) { /* 状态列 */
            width: 15%;
            min-width: 100px;
        }
        
        #flows-table th:nth-child(5),
        #flows-table td:nth-child(5) { /* 操作列 */
            width: 15%;
            min-width: 120px;
        }
        
        /* 调整错误反馈表格列宽 */
        #feedback-table th:nth-child(1),
        #feedback-table td:nth-child(1) { /* 用户ID列 */
            width: 10%;
            min-width: 90px;
        }
        
        #feedback-table th:nth-child(2),
        #feedback-table td:nth-child(2) { /* 会话ID列 */
            width: 10%;
            min-width: 90px;
        }
        
        #feedback-table th:nth-child(3),
        #feedback-table td:nth-child(3) { /* 问题列 */
            width: 14%;
            min-width: 110px;
        }
        
        #feedback-table th:nth-child(4),
        #feedback-table td:nth-child(4) { /* 机器人回复列 */
            width: 14%;
            min-width: 110px;
        }
        
        #feedback-table th:nth-child(5),
        #feedback-table td:nth-child(5) { /* 错误类型列 */
            width: 8%;
            min-width: 70px;
        }
        
        #feedback-table th:nth-child(6),
        #feedback-table td:nth-child(6) { /* 错误描述列 */
            width: 14%;
            min-width: 110px;
        }
        
        #feedback-table th:nth-child(7),
        #feedback-table td:nth-child(7) { /* 提交时间列 */
            width: 8%;
            min-width: 70px;
        }
        
        #feedback-table th:nth-child(8),
        #feedback-table td:nth-child(8) { /* 修复状态列 */
            width: 8%;
            min-width: 70px;
        }
        
        #feedback-table th:nth-child(9),
        #feedback-table td:nth-child(9) { /* 修复时间列 */
            width: 8%;
            min-width: 70px;
        }
        
        #feedback-table th:nth-child(10),
        #feedback-table td:nth-child(10) { /* 操作列 */
            width: 6%;
            min-width: 60px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .admin-container {
                padding: 1rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            h2 {
                font-size: 1.25rem;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tab {
                padding: 0.75rem;
                text-align: center;
            }
            
            .form-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .form-group label {
                min-width: auto;
            }
            
            .kb-form-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .kb-actions {
                justify-content: center;
            }
            
            th, td {
                padding: 0.75rem;
                font-size: 0.875rem;
            }
            
            .qa-content {
                max-height: 80px;
                font-size: 0.8rem;
            }
            
            .btn {
                padding: 0.625rem 1rem;
                font-size: 0.875rem;
            }
        }
        
        @media (max-width: 480px) {
            .actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>客服AI机器人管理系统</h1>
        
        <!-- 通知区域 -->
        <div x-show="notification.show" :class="`notification ${notification.type}`">
            <span x-text="notification.message"></span>
        </div>
        
        <div class="tabs">
            <div 
                class="tab" 
                :class="{ 'active': activeTab === 'knowledge-base' }"
                @click="switchTab('knowledge-base')"
            >
                知识库管理
            </div>
            <div 
                class="tab" 
                :class="{ 'active': activeTab === 'special-flows' }"
                @click="switchTab('special-flows')"
            >
                特殊流程
            </div>
            <div 
                class="tab" 
                :class="{ 'active': activeTab === 'error-feedback' }"
                @click="switchTab('error-feedback')"
            >
                错误反馈
            </div>
        </div>
        
        <!-- 知识库管理标签页 -->
        <div x-show="activeTab === 'knowledge-base'" class="tab-content">
            <div class="card">
                <h2>知识库管理</h2>
                
                <!-- 知识库URL表单行 - 使用统一的输入框 -->
                <div class="kb-form-row">
                    <label for="kb-url">知识库URL:</label>
                    <div class="kb-input-container">
                        <input 
                            type="text" 
                            id="kb-url-input"
                            x-model="kbUrlConfig.url"
                            :disabled="!isEditingKbUrl"
                            placeholder="暂无知识库URL配置"
                            @keydown.enter="isEditingKbUrl ? saveKbUrl() : null"
                            x-ref="kbUrlInput"
                        >
                    </div>
                    <div class="kb-actions">
                        <template x-if="!isEditingKbUrl">
                            <div style="display: flex; gap: 0.75rem;">
                                <button class="btn btn-outline" @click="toggleKbUrlInput()">编辑</button>
                                <button 
                                    class="btn btn-primary" 
                                    @click="rebuildCurrentKnowledgeBase()" 
                                    :disabled="!kbUrlConfig.url || loading.kb"
                                >
                                    重建知识库
                                </button>

                            </div>
                            
                        </template>
                        <template x-if="isEditingKbUrl">
                            <div style="display: flex; gap: 0.75rem;">
                                <button class="btn btn-success" @click="saveKbUrl()">保存</button>
                                <button class="btn btn-secondary" @click="cancelKbUrlEdit()">取消</button>
                            </div>
                        </template>
                        
                    </div>
                </div>
                
                <!-- 加载指示器 -->
                <div x-show="loading.kb" class="loading">
                    <div class="loading-spinner"></div>
                    <p>正在处理...</p>
                </div>
                
                <!-- 知识库表格 -->
                <div style="overflow-x: auto;">
                    <table id="kb-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>种子URL</th>
                                <th>当前URL</th>
                                <th>问题</th>
                                <th>答案</th>

    <script>
        function adminApp() {
            return {
                // 状态管理
                activeTab: 'knowledge-base',
                isEditingKbUrl: false,
                
                // 数据存储
                kbUrlConfig: { url: '' },
                knowledgeBaseItems: [],
                specialFlows: [],
                errorFeedbacks: [],
                
                // 分页配置
                pageSize: 10,
                
                // 分页状态
                pagination: {
                    kb: {
                        currentPage: 1,
                        totalItems: 0
                    },
                    flows: {
                        currentPage: 1,
                        totalItems: 0
                    },
                    feedback: {
                        currentPage: 1,
                        totalItems: 0
                    }
                },
                
                // 模态框状态
                modals: {
                    feedback: false,
                    flow: false
                },
                
                // 当前编辑的数据
                currentFeedbackUpdate: {
                    feedback_id: '',
                    status: '待修复'
                    // 移除remark字段，因为后端API不需要
                },
                currentFlow: {
                    key: '',
                    desc: '',
                    flow: '',  // 修正字段名，从prompt改为flow以匹配后端和显示逻辑
                    status: 'active'
                },
                isEditingFlow: false,
                
                // 加载状态
                loading: {
                    kb: false,
                    flows: false,
                    feedback: false
                },
                
                // 通知状态
                notification: {
                    show: false,
                    type: 'success',
                    message: ''
                },
                
                // 文本截断方法
                truncateText(text, maxLength) {
                    if (!text) return '无内容';
                    if (text.length <= maxLength) return text;
                    return text.substring(0, maxLength) + '...';
                },
                
                // 获取分页数据的方法
                getPaginatedData(data, page, pageSize) {
                    const startIndex = (page - 1) * pageSize;
                    const endIndex = startIndex + pageSize;
                    return data.slice(startIndex, endIndex);
                },
                
                // 获取总页数
                getTotalPages(totalItems, pageSize) {
                    return Math.ceil(totalItems / pageSize);
                },
                
                // 获取页码数组的方法
                getPageNumbers(totalPages) {
                    if (totalPages <= 0) return [];
                    return Array.from({length: totalPages}, (_, i) => i + 1);
                },
                
                // 切换页面
                changePage(tabType, newPage) {
                    const totalPages = this.getTotalPages(this.pagination[tabType].totalItems, this.pageSize);
                    if (newPage >= 1 && newPage <= totalPages) {
                        this.pagination[tabType].currentPage = newPage;
                    }
                },
                
                // 获取当前页的数据
                getCurrentPageData(tabType) {
                    let data = [];
                    switch (tabType) {
                        case 'kb':
                            data = this.knowledgeBaseItems;
                            break;
                        case 'flows':
                            data = this.specialFlows;
                            break;
                        case 'feedback':
                            data = this.errorFeedbacks;
                            break;
                    }
                    return this.getPaginatedData(
                        data, 
                        this.pagination[tabType].currentPage, 
                        this.pageSize
                    );
                },
                
                // 初始化
                init() {
                    this.loadKbUrlConfig();
                    this.loadKnowledgeBaseData();
                    this.loadSpecialFlows();
                    this.loadErrorFeedbacks();
                },
                
                // 切换标签页
                switchTab(tabName) {
                    this.activeTab = tabName;
                    // 根据标签页加载对应数据
                    if (tabName === 'knowledge-base' && this.knowledgeBaseItems.length === 0) {
                        this.loadKnowledgeBaseData();
                    } else if (tabName === 'special-flows' && this.specialFlows.length === 0) {
                        this.loadSpecialFlows();
                    } else if (tabName === 'error-feedback' && this.errorFeedbacks.length === 0) {
                        this.loadErrorFeedbacks();
                    }
                },
                
                // 知识库URL相关方法
                toggleKbUrlInput() {
                    this.isEditingKbUrl = !this.isEditingKbUrl;
                    if (this.isEditingKbUrl) {
                        // 延迟聚焦，确保DOM更新完成
                        this.$nextTick(() => {
                            this.$refs.kbUrlInput.focus();
                        });
                    }
                },
                
                cancelKbUrlEdit() {
                    this.isEditingKbUrl = false;
                    // 重新加载配置以确保数据一致性
                    this.loadKbUrlConfig();
                },
                
                async saveKbUrl() {
                    if (!this.kbUrlConfig.url.trim()) {
                        this.showNotification('请输入有效的知识库URL', 'error');
                        return;
                    }
                    
                    try {
                        const response = await fetch('/api/config/knowledge-base-url', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                url: this.kbUrlConfig.url.trim(),
                                rebuild: false
                            })
                        });
                        
                        const data = await response.json();
                        if (data.code === 200) {
                            this.isEditingKbUrl = false;
                            this.showNotification('知识库URL保存成功', 'success');
                        } else {
                            this.showNotification(`保存失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('保存知识库URL失败:', error);
                        this.showNotification('保存失败，请稍后再试', 'error');
                    }
                },
                
                async loadKbUrlConfig() {
                    try {
                        const response = await fetch('/api/config/knowledge-base-url');
                        const data = await response.json();
                        if (data.code === 200 && data.data && data.data.url) {
                            this.kbUrlConfig.url = data.data.url;
                        }
                    } catch (error) {
                        console.error('加载知识库URL配置失败:', error);
                    }
                },
                
                async loadKnowledgeBaseData() {
                    this.loading.kb = true;
                    try {
                        const response = await fetch('/api/knowledge-bases');
                        const data = await response.json();
                        if (data.code === 200) {
                            // 映射字段名以匹配前端期望的格式
                            this.knowledgeBaseItems = (data.data || []).map(item => ({
                                id: item.id,
                                seed_url: item.seed_url,
                                current_url: item.current_url,
                                question: item.questions, // 后端返回的是questions
                                answer: item.answers,     // 后端返回的是answers
                                create_time: item.created_at // 后端返回的是created_at
                            }));
                            // 更新分页状态
                            this.pagination.kb.totalItems = this.knowledgeBaseItems.length;
                            this.pagination.kb.currentPage = 1;
                        } else {
                            this.showNotification(`加载失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('加载知识库数据失败:', error);
                        this.showNotification('加载失败，请稍后再试', 'error');
                    } finally {
                        this.loading.kb = false;
                    }
                },
                
                async deleteKbItem(id) {
                    if (!confirm('确定要删除这条知识库记录吗？')) return;
                    
                    try {
                        const response = await fetch(`/api/knowledge-bases/${id}`, {
                            method: 'DELETE'
                        });
                        const data = await response.json();
                        if (data.code === 200) {
                            this.knowledgeBaseItems = this.knowledgeBaseItems.filter(item => item.id !== id);
                            this.showNotification('删除成功', 'success');
                        } else {
                            this.showNotification(`删除失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('删除知识库记录失败:', error);
                        this.showNotification('删除失败，请稍后再试', 'error');
                    }
                },
                
                async rebuildCurrentKnowledgeBase() {
                    if (!this.kbUrlConfig.url) {
                        this.showNotification('请先设置知识库URL', 'error');
                        return;
                    }
                    
                    if (!confirm('确定要重建知识库吗？这将清空现有数据并重新爬取。')) return;
                    
                    this.loading.kb = true;
                    try {
                        // 使用正确的知识库重建接口
                        const response = await fetch('/api/knowledge-bases/rebuild-current', {
                            method: 'POST'
                        });
                        
                        const data = await response.json();
                        if (data.code === 200) {
                            this.showNotification('知识库重建任务已启动', 'success');
                            // 重新加载数据
                            setTimeout(() => {
                                this.loadKnowledgeBaseData();
                            }, 2000);
                        } else {
                            this.showNotification(`重建失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('重建知识库失败:', error);
                        this.showNotification('重建失败，请稍后再试', 'error');
                    } finally {
                        this.loading.kb = false;
                    }
                },
                
                // 特殊流程相关方法
                async loadSpecialFlows() {
                    this.loading.flows = true;
                    try {
                        const response = await fetch('/api/special-flows');
                        const data = await response.json();
                        if (data.code === 200) {
                            this.specialFlows = data.data || [];
                            // 更新分页状态
                            this.pagination.flows.totalItems = this.specialFlows.length;
                            this.pagination.flows.currentPage = 1;
                        } else {
                            this.showNotification(`加载失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('加载特殊流程失败:', error);
                        this.showNotification('加载失败，请稍后再试', 'error');
                    } finally {
                        this.loading.flows = false;
                    }
                },
                
                showFlowModal(flow = null) {
                    if (flow) {
                        this.currentFlow = { ...flow };
                        this.isEditingFlow = true;
                    } else {
                        this.currentFlow = {
                            key: '',
                            desc: '',
                            flow: '',  // 修正字段名
                            status: 'active'
                        };
                        this.isEditingFlow = false;
                    }
                    this.modals.flow = true;
                },
                
                closeFlowModal() {
                    this.modals.flow = false;
                },
                
                async saveSpecialFlow() {
                    if (!this.currentFlow.key.trim()) {
                        this.showNotification('请输入流程标识', 'error');
                        return;
                    }
                    
                    // 根据API请求数据类型兼容性规范，只发送非空字段
                    const payload = {
                        key: this.currentFlow.key.trim()
                    };
                    
                    // 只有当字段有有效值时才添加到payload中
                    if (this.currentFlow.desc && this.currentFlow.desc.trim()) {
                        payload.desc = this.currentFlow.desc.trim();
                    }
                    
                    if (this.currentFlow.flow && this.currentFlow.flow.trim()) {
                        payload.flow = this.currentFlow.flow.trim();
                    }
                    
                    payload.status = this.currentFlow.status;
                    
                    try {
                        const url = this.isEditingFlow 
                            ? `/api/special-flows/${this.currentFlow.key}` 
                            : '/api/special-flows';
                        const method = this.isEditingFlow ? 'PUT' : 'POST';
                        
                        const response = await fetch(url, {
                            method: method,
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(payload)
                        });
                        
                        const data = await response.json();
                        if (data.code === 200) {
                            this.showNotification(this.isEditingFlow ? '更新成功' : '添加成功', 'success');
                            this.closeFlowModal();
                            this.loadSpecialFlows();
                        } else {
                            this.showNotification(`${this.isEditingFlow ? '更新' : '添加'}失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error(`${this.isEditingFlow ? '更新' : '添加'}特殊流程失败:`, error);
                        this.showNotification(`${this.isEditingFlow ? '更新' : '添加'}失败，请稍后再试`, 'error');
                    }
                },
                
                editSpecialFlow(flow) {
                    this.showFlowModal(flow);
                },
                
                async deleteSpecialFlow(key) {
                    if (!confirm('确定要删除这个特殊流程吗？')) return;
                    
                    try {
                        const response = await fetch(`/api/special-flows/${key}`, {
                            method: 'DELETE'
                        });
                        const data = await response.json();
                        if (data.code === 200) {
                            this.specialFlows = this.specialFlows.filter(flow => flow.key !== key);
                            this.showNotification('删除成功', 'success');
                        } else {
                            this.showNotification(`删除失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('删除特殊流程失败:', error);
                        this.showNotification('删除失败，请稍后再试', 'error');
                    }
                },
                
                // 错误反馈相关方法
                async loadErrorFeedbacks() {
                    this.loading.feedback = true;
                    try {
                        const response = await fetch('/api/error-feedback');
                        const data = await response.json();
                        if (data.code === 200) {
                            this.errorFeedbacks = data.data || [];
                            // 更新分页状态
                            this.pagination.feedback.totalItems = this.errorFeedbacks.length;
                            this.pagination.feedback.currentPage = 1;
                        } else {
                            this.showNotification(`加载失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('加载错误反馈失败:', error);
                        this.showNotification('加载失败，请稍后再试', 'error');
                    } finally {
                        this.loading.feedback = false;
                    }
                },
                
                showUpdateFeedbackModal(feedback) {
                    this.currentFeedbackUpdate = {
                        feedback_id: feedback.feedback_id,
                        status: ''  // 不预填充当前状态，强制用户选择
                    };
                    this.modals.feedback = true;
                },
                
                closeFeedbackModal() {
                    this.modals.feedback = false;
                },
                
                async updateFeedbackStatus() {
                    // 验证状态是否已选择
                    if (!this.currentFeedbackUpdate.status) {
                        this.showNotification('请选择修复状态', 'error');
                        return;
                    }
                    
                    try {
                        const response = await fetch(`/api/error-feedback/${this.currentFeedbackUpdate.feedback_id}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                status: this.currentFeedbackUpdate.status
                            })
                        });
                        
                        const data = await response.json();
                        if (data.code === 200) {
                            this.showNotification('状态更新成功', 'success');
                            this.closeFeedbackModal();
                            // 更新本地数据
                            const index = this.errorFeedbacks.findIndex(f => f.feedback_id === this.currentFeedbackUpdate.feedback_id);
                            if (index !== -1) {
                                this.errorFeedbacks[index].status = this.currentFeedbackUpdate.status;
                                this.errorFeedbacks[index].update_time = new Date().toISOString().slice(0, 19).replace('T', ' ');
                            }
                        } else {
                            this.showNotification(`更新失败: ${data.msg}`, 'error');
                        }
                    } catch (error) {
                        console.error('更新反馈状态失败:', error);
                        this.showNotification('更新失败，请稍后再试', 'error');
                    }
                },
                
                getFeedbackStatusText(status) {
                    const statusMap = {
                        'pending': '待处理',
                        '人工已确认': '人工已确认',
                        '无效': '无效'
                    };
                    return statusMap[status] || status;
                },
                
                getStatusColor(status) {
                    const colorMap = {
                        '人工已确认': 'color: var(--info);',
                        '无效': 'color: var(--secondary);'
                    };
                    return colorMap[status] || 'color: var(--secondary);';
                },
                
                // 获取状态显示文本的方法
                getFlowStatusText(status) {
                    return status === 'active' ? '🟢 启用' : '🔴 禁用';
                },
                
                // 获取状态颜色的方法
                getFlowStatusColor(status) {
                    return status === 'active' ? 'color: var(--success);' : 'color: var(--danger);';
                },
                
                // 获取带颜色的状态文本HTML
                getFeedbackStatusTextWithColor(status) {
                    const statusText = this.getFeedbackStatusText(status);
                    const colorStyle = this.getStatusColor(status);
                    return `<span style="${colorStyle}">${statusText}</span>`;
                },
                
                // 通知方法
                showNotification(message, type = 'success') {
                    this.notification = {
                        show: true,
                        type: type,
                        message: message
                    };
                    setTimeout(() => {
                        this.notification.show = false;
                    }, 3000);
                },
                
                // 文本截断方法
                truncateText(text, maxLength) {
                    if (!text) return '无内容';
                    if (text.length <= maxLength) return text;
                    return text.substring(0, maxLength) + '...';
                }
            };
        }
    </script>
</body>
</html>
